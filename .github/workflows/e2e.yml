name: E2E

on:
  push:
    branches:
      - main
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  real-primary:
    name: Real Kubernetes 1.35 probation
    if: github.event_name == 'push'
    continue-on-error: true
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Tauri Linux dependencies
        uses: awalsh128/cache-apt-pkgs-action@0e3c11464a8cfae52ee6ceb2b33777bcc9187892 # v1
        with:
          packages: >-
            build-essential
            libayatana-appindicator3-dev
            librsvg2-dev
            libssl-dev
            libwebkit2gtk-4.1-dev
            patchelf
            xvfb
          version: e2e-tauri-linux-v1

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.14"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run real suite
        run: xvfb-run -a bun run e2e:real -- --kubernetes 1.35 --provider docker

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-real-1.35-${{ github.run_id }}
          path: |
            e2e/artifacts/**
            .artifacts/e2e/**
          if-no-files-found: ignore

  real-matrix:
    name: Real Kubernetes ${{ matrix.kubernetes }}
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        kubernetes: ["1.34", "1.35", "1.36"]

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Tauri Linux dependencies
        uses: awalsh128/cache-apt-pkgs-action@0e3c11464a8cfae52ee6ceb2b33777bcc9187892 # v1
        with:
          packages: >-
            build-essential
            libayatana-appindicator3-dev
            librsvg2-dev
            libssl-dev
            libwebkit2gtk-4.1-dev
            patchelf
            xvfb
          version: e2e-tauri-linux-v1

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.14"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run real suite
        run: xvfb-run -a bun run e2e:real -- --kubernetes ${{ matrix.kubernetes }} --provider docker

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-real-${{ matrix.kubernetes }}-${{ github.run_id }}
          path: |
            e2e/artifacts/**
            .artifacts/e2e/**
          if-no-files-found: ignore

  desktop-smoke:
    name: Desktop smoke (${{ matrix.os }})
    if: github.event_name != 'push'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.14"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run native desktop smoke
        run: bun run e2e:desktop-smoke
