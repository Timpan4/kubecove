name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check:
    name: Typecheck and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Run React Doctor on changed files
        if: github.event_name == 'pull_request'
        run: bun run doctor:ci -- --diff origin/${{ github.base_ref }}

      - name: Run React Doctor full error gate
        if: github.event_name == 'push'
        run: bun run doctor:ci -- --full

      - name: Check React Doctor score
        env:
          REACT_DOCTOR_MIN_SCORE: "90"
        run: |
          score="$(bun node_modules/react-doctor/bin/react-doctor.js . --score --fail-on none)"
          echo "React Doctor score: ${score}"
          if [ "${score}" -lt "${REACT_DOCTOR_MIN_SCORE}" ]; then
            echo "React Doctor score ${score} is below ${REACT_DOCTOR_MIN_SCORE}."
            exit 1
          fi

      - name: Typecheck frontend
        run: bun run typecheck

      - name: Test frontend
        run: bun test

      - name: Test Rust
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Check Rust
        run: cargo check --manifest-path src-tauri/Cargo.toml
