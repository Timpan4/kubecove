name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check:
    name: Typecheck and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Bun dependencies
        uses: actions/cache@v5.0.5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Cache Rust
        uses: swatinem/rust-cache@v2.9.1
        with:
          shared-key: kubecove-rust
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Run React Doctor on changed files
        if: github.event_name == 'pull_request'
        run: bun run doctor:ci -- --diff origin/${{ github.base_ref }}

      - name: Run React Doctor full error gate
        if: github.event_name == 'push'
        run: bun run doctor:ci -- --diff false

      - name: Check React Doctor changed-file diagnostics
        if: github.event_name == 'pull_request'
        run: |
          report="$(bun node_modules/react-doctor/bin/react-doctor.js . --diff origin/${{ github.base_ref }} --json --blocking none)"
          diagnostics="$(printf '%s' "${report}" | bun -e 'const report = await new Response(Bun.stdin.stream()).json(); console.log(report.summary?.errorCount ?? 0);')"
          echo "React Doctor changed-file error diagnostics: ${diagnostics}"
          if [ "${diagnostics}" -gt "0" ]; then
            echo "React Doctor found ${diagnostics} changed-file error diagnostics."
            exit 1
          fi

      - name: Typecheck frontend
        run: bun run typecheck

      - name: Test frontend
        run: bun test

      - name: Test Rust
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Check Rust
        run: cargo check --manifest-path src-tauri/Cargo.toml
