name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  react-doctor:
    name: React Doctor
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Cache Bun dependencies
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Run React Doctor changed-file gate
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          bun node_modules/react-doctor/bin/react-doctor.js . \
            --diff origin/${{ github.base_ref }} \
            --json \
            --blocking none > react-doctor-report.json
          diagnostics="$(bun -e 'const report = await Bun.file("react-doctor-report.json").json(); console.log(report.summary?.errorCount ?? 0);')"
          echo "React Doctor changed-file error diagnostics: ${diagnostics}"
          if [ "${diagnostics}" -gt 0 ]; then
            echo "React Doctor found ${diagnostics} changed-file error diagnostics."
            exit 1
          fi

      - name: Run React Doctor full report
        if: github.event_name == 'push'
        continue-on-error: true
        run: bun run doctor:ci -- --diff false

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Cache Bun dependencies
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck frontend
        run: bun run typecheck

      - name: Lint frontend
        run: bun run lint

      - name: Test frontend
        run: bun test

  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Tauri Linux dependencies
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: >-
            libwebkit2gtk-4.1-dev
            libayatana-appindicator3-dev
            librsvg2-dev
            patchelf
          version: ci-tauri-linux-v1

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          shared-key: kubecove-rust-ci
          workspaces: "./src-tauri -> target"

      - name: Test Rust
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Lint Rust
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --all-features -- -D warnings

  check:
    name: Typecheck and test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - react-doctor
      - frontend
      - rust
    if: always()

    steps:
      - name: Verify required jobs
        env:
          REACT_DOCTOR_RESULT: ${{ needs.react-doctor.result }}
          FRONTEND_RESULT: ${{ needs.frontend.result }}
          RUST_RESULT: ${{ needs.rust.result }}
        run: |
          set -euo pipefail
          echo "React Doctor: ${REACT_DOCTOR_RESULT}"
          echo "Frontend checks: ${FRONTEND_RESULT}"
          echo "Rust checks: ${RUST_RESULT}"
          test "${REACT_DOCTOR_RESULT}" = "success"
          test "${FRONTEND_RESULT}" = "success"
          test "${RUST_RESULT}" = "success"
