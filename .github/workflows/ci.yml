name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Cache Bun dependencies
        uses: actions/cache@v6.1.0
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Audit frontend dependencies
        run: bun run audit

      - name: Typecheck frontend
        run: bun run typecheck

      - name: Check Svelte frontend
        run: bun run svelte:check

      - name: Lint frontend
        run: bun run lint

      - name: Test frontend
        run: bun test

  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Tauri Linux dependencies
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: >-
            libwebkit2gtk-4.1-dev
            libayatana-appindicator3-dev
            librsvg2-dev
            patchelf
          version: ci-tauri-linux-v1

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          shared-key: kubecove-rust-ci
          workspaces: "./src-tauri -> target"

      - name: Test Rust
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Lint Rust
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --all-features -- -D warnings

  check:
    name: Typecheck and test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - frontend
      - rust
    if: always()

    steps:
      - name: Verify required jobs
        env:
          FRONTEND_RESULT: ${{ needs.frontend.result }}
          RUST_RESULT: ${{ needs.rust.result }}
        run: |
          set -euo pipefail
          echo "Frontend checks: ${FRONTEND_RESULT}"
          echo "Rust checks: ${RUST_RESULT}"
          test "${FRONTEND_RESULT}" = "success"
          test "${RUST_RESULT}" = "success"
