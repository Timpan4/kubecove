name: CodSpeed

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  benchmarks:
    name: Run benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Tauri Linux dependencies
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: >-
            libwebkit2gtk-4.1-dev
            libayatana-appindicator3-dev
            librsvg2-dev
            patchelf
          version: ci-tauri-linux-v1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Bun dependencies
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          shared-key: kubecove-rust-codspeed
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Install cargo-codspeed
        run: cargo install cargo-codspeed --version 5.0.1 --locked

      - name: Build Rust benchmarks
        working-directory: src-tauri
        run: cargo codspeed build --features bench-support --bench backend_hot_paths --locked

      - name: Run benchmarks
        uses: CodSpeedHQ/action@v4
        with:
          mode: simulation
          run: bunx vitest bench --run && cd src-tauri && cargo codspeed run --bench backend_hot_paths
