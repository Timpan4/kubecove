name: Yank Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, for example app-v0.4.3
        required: true
        type: string
      action:
        description: Recovery action
        required: true
        type: choice
        options:
          - draft
          - delete-release

permissions:
  contents: write

jobs:
  yank:
    name: Yank bad release
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Yank release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ inputs.tag }}
          YANK_ACTION: ${{ inputs.action }}
        run: |
          set -euo pipefail
          if ! [[ "$RELEASE_TAG" =~ ^app-v[0-9]+\.[0-9]+\.[0-9]+([+-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release tag: $RELEASE_TAG" >&2
            exit 1
          fi

          case "$YANK_ACTION" in
            draft)
              gh release edit "$RELEASE_TAG" --draft=true
              ;;
            delete-release)
              gh release delete "$RELEASE_TAG" --yes
              ;;
            *)
              echo "Unknown yank action: $YANK_ACTION" >&2
              exit 1
              ;;
          esac

          gh api "/repos/${GH_REPO}/releases?per_page=20" > releases.json
          node <<'EOF'
          const { readFileSync } = require("node:fs");
          const releases = JSON.parse(readFileSync("releases.json", "utf8"));
          const previous = releases.find((release) =>
            !release.draft &&
            release.tag_name !== process.env.RELEASE_TAG &&
            /^app-v\d+\.\d+\.\d+/.test(release.tag_name)
          );
          console.log(previous
            ? `Previous visible release: ${previous.tag_name} ${previous.html_url}`
            : "No previous visible app-v release found.");
          EOF
