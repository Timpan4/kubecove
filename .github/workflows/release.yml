name: Release

on:
  push:
    tags:
      - "app-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      release-draft: ${{ steps.release.outputs.release-draft }}

    steps:
      - name: Detect existing release state
        id: release
        shell: bash
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if release_draft="$(gh release view "$TAG_NAME" --json isDraft --jq '.isDraft' 2>release-error.txt)"; then
            echo "release-draft=$release_draft" >> "$GITHUB_OUTPUT"
          elif grep -qiE "not found|404" release-error.txt; then
            echo "release-draft=true" >> "$GITHUB_OUTPUT"
          else
            cat release-error.txt >&2
            exit 1
          fi

  build:
    name: Build ${{ matrix.label }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS universal
            platform: macos-latest
            args: "--target universal-apple-darwin --no-sign"
            rust-targets: "aarch64-apple-darwin x86_64-apple-darwin"
          - label: Windows x64
            platform: windows-latest
            args: "--target x86_64-pc-windows-msvc --no-sign"
            rust-targets: "x86_64-pc-windows-msvc"
          - label: Linux x64
            platform: ubuntu-22.04
            args: "--target x86_64-unknown-linux-gnu --no-sign"
            rust-targets: "x86_64-unknown-linux-gnu"

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux Tauri dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            file \
            libayatana-appindicator3-dev \
            libfuse2 \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            rpm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust targets
        run: rustup target add ${{ matrix.rust-targets }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Validate release tag and versions
        shell: bash
        env:
          TAG_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          PACKAGE_VERSION="$(bun -p "require('./package.json').version")"
          TAURI_VERSION="$(bun -p "require('./src-tauri/tauri.conf.json').version")"
          CARGO_VERSION="$(sed -n 's/^version = \"\\(.*\\)\"/\\1/p' src-tauri/Cargo.toml | head -n 1)"

          echo "package.json version: $PACKAGE_VERSION"
          echo "tauri.conf.json version: $TAURI_VERSION"
          echo "Cargo.toml version: $CARGO_VERSION"
          echo "release ref: $REF_TYPE $TAG_NAME"

          if [ "$PACKAGE_VERSION" != "$TAURI_VERSION" ]; then
            echo "package.json and tauri.conf.json versions must match."
            exit 1
          fi
          if [ "$PACKAGE_VERSION" != "$CARGO_VERSION" ]; then
            echo "package.json and Cargo.toml versions must match."
            exit 1
          fi
          if [ "$REF_TYPE" != "tag" ]; then
            echo "Release workflow must run from an app-v* tag. For manual dispatch, choose the existing release tag ref."
            exit 1
          fi
          if [ "$TAG_NAME" != "app-v$PACKAGE_VERSION" ]; then
            echo "Release tag must match app-v<package version>. Expected app-v$PACKAGE_VERSION, found $TAG_NAME."
            exit 1
          fi

      - name: Typecheck frontend
        run: bun run typecheck

      - name: Test frontend
        run: bun test

      - name: Test Rust
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Check Rust
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__
          releaseName: "KubeCove v__VERSION__"
          releaseBody: "Beta installers for KubeCove. These artifacts are unsigned beta builds; smoke test before sharing broadly."
          releaseDraft: ${{ needs.prepare.outputs.release-draft }}
          prerelease: false
          args: ${{ matrix.args }}

  publish:
    name: Publish release
    needs:
      - prepare
      - build
    if: needs.prepare.outputs.release-draft == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Publish completed release
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: gh release edit "$TAG_NAME" --draft=false --prerelease=false
