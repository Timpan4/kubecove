name: Release

on:
  push:
    tags:
      - "app-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      release-draft: ${{ steps.release.outputs.release-draft }}

    steps:
      - name: Detect existing release state
        id: release
        shell: bash
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if release_draft="$(gh release view "$TAG_NAME" --json isDraft --jq '.isDraft' 2>release-error.txt)"; then
            echo "release-draft=$release_draft" >> "$GITHUB_OUTPUT"
          elif grep -qiE "not found|404" release-error.txt; then
            echo "release-draft=true" >> "$GITHUB_OUTPUT"
          else
            cat release-error.txt >&2
            exit 1
          fi

  build:
    name: Build ${{ matrix.label }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS universal
            platform: macos-latest
            args: "--target universal-apple-darwin --bundles app,dmg"
            rust-targets: "aarch64-apple-darwin x86_64-apple-darwin"
            expected-updater-platforms: "darwin-aarch64 darwin-x86_64"
            expected-updater-assets: "KubeCove.app.tar.gz KubeCove.app.tar.gz.sig"
          - label: Windows x64
            platform: windows-latest
            args: "--target x86_64-pc-windows-msvc"
            rust-targets: "x86_64-pc-windows-msvc"
            expected-updater-platforms: "windows-x86_64 windows-x86_64-nsis"
            expected-updater-assets: "KubeCove___VERSION___x64-setup.exe KubeCove___VERSION___x64-setup.exe.sig"
          - label: Linux x64
            platform: ubuntu-latest
            args: "--target x86_64-unknown-linux-gnu"
            rust-targets: "x86_64-unknown-linux-gnu"
            expected-updater-platforms: "linux-x86_64 linux-x86_64-appimage"
            expected-updater-assets: "KubeCove___VERSION___amd64.AppImage KubeCove___VERSION___amd64.AppImage.sig"

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Linux Tauri dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            file \
            libayatana-appindicator3-dev \
            libfuse2 \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            rpm

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: latest

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Bun dependencies
        uses: actions/cache@v5.0.5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install Rust targets
        run: rustup target add ${{ matrix.rust-targets }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2.9.1
        with:
          shared-key: kubecove-rust
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Validate release tag and versions
        env:
          TAG_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
        run: bun scripts/validate-release-tag.ts

      - name: Read release notes
        id: release_body
        shell: bash
        run: |
          {
            echo "body<<EOF"
            bun scripts/release-body.ts
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Typecheck frontend
        run: bun run typecheck

      - name: Test frontend
        run: bun test

      - name: Test Rust
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Check Rust
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VITE_KUBECOVE_RELEASE_CHANNEL: stable
        with:
          tagName: app-v__VERSION__
          releaseName: "KubeCove v__VERSION__"
          releaseBody: ${{ steps.release_body.outputs.body }}
          releaseDraft: ${{ needs.prepare.outputs.release-draft }}
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}

      - name: Verify updater JSON asset
        shell: bash
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
          EXPECTED_UPDATER_PLATFORMS: ${{ matrix.expected-updater-platforms }}
          EXPECTED_UPDATER_ASSETS: ${{ matrix.expected-updater-assets }}
        run: |
          set -euo pipefail
          version="${TAG_NAME#app-v}"
          gh release view "$TAG_NAME" --json assets --jq '.assets[].name' > release-assets.txt
          grep -qx latest.json release-assets.txt

          for asset_template in $EXPECTED_UPDATER_ASSETS; do
            asset="${asset_template//__VERSION__/$version}"
            grep -qx "$asset" release-assets.txt
          done

          rm -rf updater-json-check
          mkdir -p updater-json-check
          gh release download "$TAG_NAME" --pattern latest.json --clobber --dir updater-json-check
          node <<'EOF'
          const { readFileSync } = require("node:fs");

          const latest = JSON.parse(readFileSync("updater-json-check/latest.json", "utf8"));
          const platforms = latest.platforms ?? {};
          const missing = process.env.EXPECTED_UPDATER_PLATFORMS
            .split(/\s+/)
            .filter(Boolean)
            .filter((platform) => !platforms[platform]);

          if (missing.length > 0) {
            throw new Error(`latest.json is missing updater platforms: ${missing.join(", ")}`);
          }
          EOF

  publish:
    name: Publish release
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest

    steps:
      - name: Verify final updater platform coverage
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="${TAG_NAME#app-v}"
          tmp="$(mktemp -d)"
          gh release view "$TAG_NAME" --json assets --jq '.assets[].name' > "$tmp/assets.txt"
          gh release download "$TAG_NAME" --pattern latest.json --clobber --dir "$tmp"
          UPDATER_CHECK_DIR="$tmp" RELEASE_VERSION="$version" node <<'EOF'
          const { readFileSync } = require("node:fs");

          const dir = process.env.UPDATER_CHECK_DIR;
          const version = process.env.RELEASE_VERSION;
          const assets = new Set(readFileSync(`${dir}/assets.txt`, "utf8")
            .split(/\r?\n/)
            .filter(Boolean));
          const latest = JSON.parse(readFileSync(`${dir}/latest.json`, "utf8"));
          const platforms = latest.platforms ?? {};

          const requiredAssets = [
            "KubeCove.app.tar.gz",
            "KubeCove.app.tar.gz.sig",
            `KubeCove_${version}_amd64.AppImage`,
            `KubeCove_${version}_amd64.AppImage.sig`,
            `KubeCove_${version}_x64-setup.exe`,
            `KubeCove_${version}_x64-setup.exe.sig`,
            "latest.json",
          ];
          const requiredPlatforms = [
            "darwin-aarch64",
            "darwin-x86_64",
            "linux-x86_64",
            "linux-x86_64-appimage",
            "windows-x86_64",
            "windows-x86_64-nsis",
          ];

          const missingAssets = requiredAssets.filter((asset) => !assets.has(asset));
          const missingPlatforms = requiredPlatforms.filter((platform) => !platforms[platform]);

          if (missingAssets.length > 0 || missingPlatforms.length > 0) {
            throw new Error([
              missingAssets.length ? `missing assets: ${missingAssets.join(", ")}` : null,
              missingPlatforms.length ? `missing platforms: ${missingPlatforms.join(", ")}` : null,
            ].filter(Boolean).join("; "));
          }
          EOF

      - name: Publish completed release
        if: needs.prepare.outputs.release-draft == 'true'
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: gh release edit "$TAG_NAME" --draft=false --prerelease=false
