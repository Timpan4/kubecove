apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata: {name: e2e-platform, namespace: argocd}
spec:
  sourceRepos:
    - __KUBECOVE_GIT_REPO_URL__
  destinations:
    - {namespace: argocd, server: https://kubernetes.default.svc}
    - {namespace: kube-system, server: https://kubernetes.default.svc}
    - {namespace: cilium-secrets, server: https://kubernetes.default.svc}
    - {namespace: local-path-storage, server: https://kubernetes.default.svc}
    - {namespace: traefik, server: https://kubernetes.default.svc}
  clusterResourceWhitelist:
    - {group: '', kind: Namespace}
    - {group: rbac.authorization.k8s.io, kind: ClusterRole}
    - {group: rbac.authorization.k8s.io, kind: ClusterRoleBinding}
    - {group: apiextensions.k8s.io, kind: CustomResourceDefinition}
    - {group: apiregistration.k8s.io, kind: APIService}
    - {group: storage.k8s.io, kind: StorageClass}
    - {group: networking.k8s.io, kind: IngressClass}
    - {group: cilium.io, kind: CiliumClusterwideNetworkPolicy}
  namespaceResourceWhitelist:
    - {group: '', kind: Pod}
    - {group: '', kind: ConfigMap}
    - {group: '', kind: Secret}
    - {group: '', kind: Service}
    - {group: '', kind: ServiceAccount}
    - {group: '', kind: Endpoints}
    - {group: apps, kind: Deployment}
    - {group: apps, kind: DaemonSet}
    - {group: apps, kind: StatefulSet}
    - {group: batch, kind: Job}
    - {group: rbac.authorization.k8s.io, kind: Role}
    - {group: rbac.authorization.k8s.io, kind: RoleBinding}
    - {group: networking.k8s.io, kind: NetworkPolicy}
    - {group: policy, kind: PodDisruptionBudget}
    - {group: cilium.io, kind: CiliumNetworkPolicy}
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata: {name: e2e-tenants, namespace: argocd}
spec:
  sourceRepos: [__KUBECOVE_GIT_REPO_URL__]
  destinations:
    - {namespace: tenant-catalog, server: https://kubernetes.default.svc}
    - {namespace: tenant-ledger, server: https://kubernetes.default.svc}
  clusterResourceWhitelist:
    - {group: '', kind: Namespace}
  namespaceResourceWhitelist:
    - {group: '', kind: Pod}
    - {group: '', kind: ConfigMap}
    - {group: '', kind: Secret}
    - {group: '', kind: Service}
    - {group: '', kind: ServiceAccount}
    - {group: apps, kind: Deployment}
    - {group: apps, kind: StatefulSet}
    - {group: batch, kind: Job}
    - {group: batch, kind: CronJob}
    - {group: autoscaling, kind: HorizontalPodAutoscaler}
    - {group: policy, kind: PodDisruptionBudget}
    - {group: networking.k8s.io, kind: Ingress}
    - {group: networking.k8s.io, kind: NetworkPolicy}
    - {group: rbac.authorization.k8s.io, kind: Role}
    - {group: rbac.authorization.k8s.io, kind: RoleBinding}
    - {group: '', kind: ResourceQuota}
    - {group: '', kind: LimitRange}
