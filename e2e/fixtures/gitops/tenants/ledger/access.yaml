apiVersion: v1
kind: ServiceAccount
metadata: {name: ledger, namespace: tenant-ledger}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata: {name: ledger-config-reader, namespace: tenant-ledger}
rules: [{apiGroups: [''], resources: [configmaps], resourceNames: [ledger-config], verbs: [get]}]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata: {name: ledger-config-reader, namespace: tenant-ledger}
roleRef: {apiGroup: rbac.authorization.k8s.io, kind: Role, name: ledger-config-reader}
subjects: [{kind: ServiceAccount, name: ledger, namespace: tenant-ledger}]
---
apiVersion: v1
kind: ResourceQuota
metadata: {name: ledger-quota, namespace: tenant-ledger}
spec: {hard: {requests.cpu: '1', requests.memory: 1Gi, limits.cpu: '2', limits.memory: 2Gi, persistentvolumeclaims: '4'}}
