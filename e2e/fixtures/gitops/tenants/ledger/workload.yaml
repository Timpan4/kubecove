apiVersion: v1
kind: ConfigMap
metadata: {name: ledger-config, namespace: tenant-ledger}
data: {retention: 7d}
---
apiVersion: v1
kind: Service
metadata: {name: ledger, namespace: tenant-ledger}
spec: {clusterIP: None, selector: {app.kubernetes.io/name: ledger}, ports: [{name: ledger, port: 8080}]}
---
apiVersion: apps/v1
kind: StatefulSet
metadata: {name: ledger, namespace: tenant-ledger}
spec:
  serviceName: ledger
  replicas: 1
  selector: {matchLabels: {app.kubernetes.io/name: ledger}}
  template:
    metadata: {labels: {app.kubernetes.io/name: ledger}}
    spec:
      serviceAccountName: ledger
      containers:
        - name: ledger
          image: busybox:1.36.1@sha256:73aaf090f3d85aa34ee199857f03fa3a95c8ede2ffd4cc2cdb5b94e566b11662
          command: [sh, -c, 'test -f /data/marker || echo kubecove-ledger-persistent >/data/marker; exec sleep 86400']
          resources: {requests: {cpu: 20m, memory: 32Mi}, limits: {cpu: 150m, memory: 128Mi}}
          volumeMounts: [{name: data, mountPath: /data}]
  volumeClaimTemplates:
    - metadata: {name: data}
      spec: {accessModes: [ReadWriteOnce], storageClassName: local-path, resources: {requests: {storage: 64Mi}}}
---
apiVersion: batch/v1
kind: Job
metadata: {name: ledger-migrate, namespace: tenant-ledger}
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: busybox:1.36.1@sha256:73aaf090f3d85aa34ee199857f03fa3a95c8ede2ffd4cc2cdb5b94e566b11662
          command: [sh, -c, 'echo migration-complete']
          resources: {requests: {cpu: 10m, memory: 16Mi}, limits: {cpu: 100m, memory: 64Mi}}
---
apiVersion: batch/v1
kind: CronJob
metadata: {name: ledger-retention, namespace: tenant-ledger}
spec:
  schedule: '17 3 * * *'
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: retention
              image: busybox:1.36.1@sha256:73aaf090f3d85aa34ee199857f03fa3a95c8ede2ffd4cc2cdb5b94e566b11662
              command: [sh, -c, 'echo ledger-retention']
              resources: {requests: {cpu: 10m, memory: 16Mi}, limits: {cpu: 100m, memory: 64Mi}}
