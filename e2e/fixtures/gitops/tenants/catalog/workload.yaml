apiVersion: v1
kind: ConfigMap
metadata: {name: catalog-config, namespace: tenant-catalog}
data: {mode: production-shaped}
---
apiVersion: v1
kind: Secret
metadata: {name: catalog-fixture, namespace: tenant-catalog}
type: Opaque
stringData: {fixture: non-sensitive-e2e-only}
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: catalog, namespace: tenant-catalog}
spec:
  replicas: 2
  selector: {matchLabels: {app.kubernetes.io/name: catalog}}
  template:
    metadata: {labels: {app.kubernetes.io/name: catalog}}
    spec:
      serviceAccountName: catalog
      containers:
        - name: catalog
          image: busybox:1.36.1@sha256:73aaf090f3d85aa34ee199857f03fa3a95c8ede2ffd4cc2cdb5b94e566b11662
          command: [sh, -c, 'mkdir -p /www; echo catalog-ingress-marker >/www/index.html; exec httpd -f -p 8080 -h /www']
          ports: [{name: http, containerPort: 8080}]
          readinessProbe: {httpGet: {path: /, port: http}, periodSeconds: 2}
          livenessProbe: {httpGet: {path: /, port: http}, periodSeconds: 3}
          resources: {requests: {cpu: 20m, memory: 32Mi}, limits: {cpu: 150m, memory: 128Mi}}
---
apiVersion: v1
kind: Service
metadata: {name: catalog, namespace: tenant-catalog}
spec: {selector: {app.kubernetes.io/name: catalog}, ports: [{name: http, port: 80, targetPort: http}]}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata: {name: catalog, namespace: tenant-catalog}
spec:
  ingressClassName: traefik
  rules: [{host: catalog.e2e.local, http: {paths: [{path: /, pathType: Prefix, backend: {service: {name: catalog, port: {name: http}}}}]}}]
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: {name: catalog, namespace: tenant-catalog}
spec: {scaleTargetRef: {apiVersion: apps/v1, kind: Deployment, name: catalog}, minReplicas: 2, maxReplicas: 3, metrics: [{type: Resource, resource: {name: cpu, target: {type: Utilization, averageUtilization: 80}}}]}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata: {name: catalog, namespace: tenant-catalog}
spec: {minAvailable: 1, selector: {matchLabels: {app.kubernetes.io/name: catalog}}}
---
apiVersion: v1
kind: Pod
metadata:
  name: declared-client
  namespace: tenant-catalog
  labels: {kubecove.io/network-role: declared-client}
spec:
  containers:
    - name: client
      image: busybox:1.36.1@sha256:73aaf090f3d85aa34ee199857f03fa3a95c8ede2ffd4cc2cdb5b94e566b11662
      command: [sh, -c, 'exec sleep 86400']
      resources: {requests: {cpu: 5m, memory: 8Mi}, limits: {cpu: 50m, memory: 32Mi}}
  restartPolicy: Always
---
apiVersion: v1
kind: Pod
metadata:
  name: isolated-client
  namespace: tenant-catalog
  labels: {kubecove.io/network-role: isolated-client}
spec:
  containers:
    - name: client
      image: busybox:1.36.1@sha256:73aaf090f3d85aa34ee199857f03fa3a95c8ede2ffd4cc2cdb5b94e566b11662
      command: [sh, -c, 'exec sleep 86400']
      resources: {requests: {cpu: 5m, memory: 8Mi}, limits: {cpu: 50m, memory: 32Mi}}
  restartPolicy: Always
