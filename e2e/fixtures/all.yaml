apiVersion: v1
kind: Namespace
metadata: {name: e2e-discovery}
---
apiVersion: v1
kind: Namespace
metadata: {name: e2e-watch}
---
apiVersion: v1
kind: Namespace
metadata: {name: e2e-apply}
---
apiVersion: v1
kind: Namespace
metadata: {name: e2e-restricted}
---
apiVersion: v1
kind: Namespace
metadata: {name: e2e-sessions}
---
apiVersion: v1
kind: Namespace
metadata: {name: e2e-integrations}
---
apiVersion: v1
kind: Namespace
metadata: {name: argocd}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: discovery-api
  namespace: e2e-discovery
spec:
  replicas: 1
  selector: {matchLabels: {app: discovery-api}}
  template:
    metadata: {labels: {app: discovery-api}}
    spec:
      securityContext: {runAsNonRoot: true, runAsUser: 65534, runAsGroup: 65534}
      containers:
        - name: api
          image: busybox:1.36.1@sha256:73aaf090f3d85aa34ee199857f03fa3a95c8ede2ffd4cc2cdb5b94e566b11662
          command: ["sh", "-c", "exec sleep 86400"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: {drop: ["ALL"]}
            readOnlyRootFilesystem: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fixture-api
  namespace: e2e-sessions
spec:
  replicas: 1
  selector: {matchLabels: {app: fixture-api}}
  template:
    metadata: {labels: {app: fixture-api}}
    spec:
      securityContext: {runAsNonRoot: true, runAsUser: 65534, runAsGroup: 65534, fsGroup: 65534}
      containers:
        - name: api
          image: busybox:1.36.1@sha256:73aaf090f3d85aa34ee199857f03fa3a95c8ede2ffd4cc2cdb5b94e566b11662
          command:
            - sh
            - -c
            - mkdir -p /www; echo kubecove-http-marker > /www/index.html; echo kubecove-log-marker; exec httpd -f -p 8080 -h /www
          ports: [{containerPort: 8080}]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: {drop: ["ALL"]}
            readOnlyRootFilesystem: true
          volumeMounts: [{name: www, mountPath: /www}]
          readinessProbe:
            httpGet: {path: /, port: 8080}
            initialDelaySeconds: 1
            periodSeconds: 1
      volumes: [{name: www, emptyDir: {}}]
---
apiVersion: v1
kind: Service
metadata:
  name: fixture-api
  namespace: e2e-sessions
spec:
  selector: {app: fixture-api}
  ports: [{name: http, port: 8080, targetPort: 8080}]
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: apply-target
  namespace: e2e-apply
data: {marker: before-apply}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: restricted-target
  namespace: e2e-restricted
data: {marker: unchanged}
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata: {name: fixture-project, namespace: argocd}
spec: {sourceRepos: ["*"], destinations: [{namespace: "*", server: "*"}]}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata: {name: fixture-app, namespace: argocd}
spec: {project: fixture-project, destination: {namespace: e2e-integrations, server: https://kubernetes.default.svc}, source: {repoURL: https://example.invalid/fixture, targetRevision: HEAD}}
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata: {name: fixture-appset, namespace: argocd}
spec: {generators: [], template: {metadata: {name: fixture-generated}, spec: {project: fixture-project, destination: {namespace: e2e-integrations, server: https://kubernetes.default.svc}, source: {repoURL: https://example.invalid/fixture, targetRevision: HEAD}}}}
