apiVersion: v1
kind: Namespace
metadata: {name: e2e-discovery}
---
apiVersion: v1
kind: Namespace
metadata: {name: e2e-watch}
---
apiVersion: v1
kind: Namespace
metadata: {name: e2e-apply}
---
apiVersion: v1
kind: Namespace
metadata: {name: e2e-restricted}
---
apiVersion: v1
kind: Namespace
metadata: {name: e2e-sessions}
---
apiVersion: v1
kind: Namespace
metadata: {name: e2e-system}
---
apiVersion: v1
kind: ConfigMap
metadata: {name: apply-target, namespace: e2e-apply}
data: {marker: before-apply}
---
apiVersion: v1
kind: ConfigMap
metadata: {name: restricted-target, namespace: e2e-restricted}
data: {marker: unchanged}
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: discovery-api, namespace: e2e-discovery}
spec:
  replicas: 1
  selector: {matchLabels: {app: discovery-api}}
  template:
    metadata: {labels: {app: discovery-api, app.kubernetes.io/name: discovery-api}}
    spec:
      automountServiceAccountToken: false
      securityContext: {runAsNonRoot: true, runAsUser: 65534, runAsGroup: 65534, seccompProfile: {type: RuntimeDefault}}
      containers:
        - name: api
          image: busybox:1.36.1@sha256:73aaf090f3d85aa34ee199857f03fa3a95c8ede2ffd4cc2cdb5b94e566b11662
          command: [sh, -c, 'exec sleep 86400']
          resources: {requests: {cpu: 10m, memory: 16Mi}, limits: {cpu: 100m, memory: 64Mi}}
          securityContext: {allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: {drop: [ALL]}}
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: fixture-api, namespace: e2e-sessions}
spec:
  replicas: 1
  selector: {matchLabels: {app: fixture-api}}
  template:
    metadata: {labels: {app: fixture-api, app.kubernetes.io/name: fixture-api}}
    spec:
      automountServiceAccountToken: false
      securityContext: {runAsNonRoot: true, runAsUser: 65534, runAsGroup: 65534, fsGroup: 65534, seccompProfile: {type: RuntimeDefault}}
      containers:
        - name: api
          image: busybox:1.36.1@sha256:73aaf090f3d85aa34ee199857f03fa3a95c8ede2ffd4cc2cdb5b94e566b11662
          command: [sh, -c, 'mkdir -p /www; echo kubecove-http-marker >/www/index.html; echo kubecove-log-marker; exec httpd -f -p 8080 -h /www']
          ports: [{containerPort: 8080, name: http}]
          readinessProbe: {httpGet: {path: /, port: http}, periodSeconds: 1}
          resources: {requests: {cpu: 10m, memory: 16Mi}, limits: {cpu: 100m, memory: 64Mi}}
          securityContext: {allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: {drop: [ALL]}}
          volumeMounts: [{name: www, mountPath: /www}]
      volumes: [{name: www, emptyDir: {}}]
---
apiVersion: v1
kind: Service
metadata: {name: fixture-api, namespace: e2e-sessions}
spec:
  selector: {app: fixture-api}
  ports: [{name: http, port: 8080, targetPort: http}]
