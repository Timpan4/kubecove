apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata: {name: e2e-root, namespace: argocd}
spec:
  sourceRepos: [__KUBECOVE_GIT_REPO_URL__]
  destinations: [{namespace: argocd, server: https://kubernetes.default.svc}]
  clusterResourceWhitelist: []
  namespaceResourceWhitelist:
    - {group: argoproj.io, kind: Application}
    - {group: argoproj.io, kind: ApplicationSet}
    - {group: argoproj.io, kind: AppProject}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata: {name: root-application, namespace: argocd}
spec:
  project: e2e-root
  source: {repoURL: __KUBECOVE_GIT_REPO_URL__, targetRevision: main, path: bootstrap}
  destination: {server: https://kubernetes.default.svc, namespace: argocd}
  syncPolicy:
    automated: {prune: true, selfHeal: true}
