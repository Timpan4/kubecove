deployment:
  replicas: 1
service:
  spec:
    type: ClusterIP
resources:
  requests: {cpu: 50m, memory: 64Mi}
  limits: {cpu: 250m, memory: 256Mi}
ports:
  web:
    expose:
      default: true
providers:
  kubernetesIngress:
    publishedService:
      enabled: false
    ingressEndpoint:
      hostname: traefik.e2e.local
