global:
  domain: argocd.e2e.local
configs:
  cm:
    timeout.reconciliation: 10s
  params:
    server.insecure: true
controller:
  replicas: 1
  resources:
    requests: {cpu: 100m, memory: 128Mi}
    limits: {cpu: 500m, memory: 512Mi}
server:
  replicas: 1
  resources:
    requests: {cpu: 50m, memory: 64Mi}
    limits: {cpu: 250m, memory: 256Mi}
repoServer:
  replicas: 1
  resources:
    requests: {cpu: 50m, memory: 128Mi}
    limits: {cpu: 500m, memory: 512Mi}
applicationSet:
  replicas: 1
  resources:
    requests: {cpu: 50m, memory: 64Mi}
    limits: {cpu: 250m, memory: 256Mi}
redis:
  enabled: true
redis-ha:
  enabled: false
notifications:
  enabled: false
dex:
  enabled: false
