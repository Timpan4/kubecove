      fill="none"
      stroke="url(#blue)"
      stroke-width="46"
      stroke-linecap="round"
      opacity=".88"
    />

    <path
      d="M282 694 C383 616 483 621 579 674 C673 726 741 693 793 641"
      fill="none"
      stroke="url(#teal)"
      stroke-width="36"
      stroke-linecap="round"
      opacity=".70"
    />
  </g>

  <path
    d="M512 205 L772 356 L772 647 L512 812 L252 647 L252 356 Z"
    fill="none"
    stroke="url(#white)"
    stroke-width="47"
    stroke-linejoin="round"
  />

  <path
    d="M512 258 L724 381 L724 624 L512 759 L300 624 L300 381 Z"
    fill="none"
    stroke="url(#bevel)"
    stroke-width="9"
    stroke-linejoin="round"
    opacity=".72"
  />

  <g filter="url(#smallShadow)">
    <path
      d="M439 375 H586 L659 502 L586 628 H439 L365 502 Z"
      fill="url(#white)"
    />

    <path
      d="M474 427 H552 L602 502 L552 577 H474 L423 502 Z"
      fill="#0c2233"
      stroke="url(#bevel)"
      stroke-width="21"
      stroke-linejoin="round"
    />

    <circle
      cx="512"
      cy="502"
      r="36"
      fill="url(#white)"
    />
  </g>

  <g>
    <path
      d="M247 663 C347 592 454 591 556 643 C657 695 740 670 798 604"
      fill="none"
      stroke="url(#cyan)"
      stroke-width="24"
      stroke-linecap="round"
      opacity=".86"
    />

    <path
      d="M258 657 C361 592 452 582 555 630 C657 678 744 654 807 587"
      fill="none"
      stroke="url(#blue)"
      stroke-width="37"
      stroke-linecap="round"
      opacity=".96"
    />

    <path
      d="M243 717 C352 637 455 638 557 692 C656 745 733 704 794 649"
      fill="none"
      stroke="url(#teal)"
      stroke-width="23"
      stroke-linecap="round"
      opacity=".96"
    />
  </g>

  <g>
    <path
      d="M213 677 C305 592 409 584 510 610 C611 636 664 684 746 639 C780 621 805 594 829 569"
      fill="none"
      stroke="#020a16"
      stroke-width="54"
      stroke-linecap="round"
      opacity=".24"
    />

    <path
      d="M213 677 C305 592 409 584 510 610 C611 636 664 684 746 639 C780 621 805 594 829 569"
      fill="none"
      stroke="url(#whiteWave)"
      stroke-width="40"
      stroke-linecap="round"
    />

    <path
      d="M218 694 C316 608 414 604 510 630 C612 658 667 699 752 653 C788 633 813 605 835 581"
      fill="none"
      stroke="#bff5ff"
      stroke-width="10"
      stroke-linecap="round"
      opacity=".72"
    />
  </g>
</svg>
