<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">KubeCove logo</title>
  <desc id="desc">KubeCove app icon with a dark rounded-square background, hexagonal Kubernetes-inspired frame, central nut, and layered blue and green waves.</desc>

  <defs>
    <linearGradient id="bg" x1="190" y1="0" x2="820" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#244e5b"/>
      <stop offset="0.48" stop-color="#142d3f"/>
      <stop offset="1" stop-color="#071126"/>
    </linearGradient>

    <radialGradient id="topGlow" cx="50%" cy="4%" r="58%">
      <stop offset="0" stop-color="#2d6b72" stop-opacity=".46"/>
      <stop offset=".55" stop-color="#244b5a" stop-opacity=".14"/>
      <stop offset="1" stop-color="#071126" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="innerGlow" cx="51%" cy="52%" r="37%">
      <stop offset="0" stop-color="#244f61" stop-opacity=".42"/>
      <stop offset="1" stop-color="#0a1928" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="white" x1="360" y1="240" x2="660" y2="790" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset=".55" stop-color="#eefbff"/>
      <stop offset="1" stop-color="#c7dce5"/>
    </linearGradient>

    <linearGradient id="whiteWave" x1="220" y1="635" x2="850" y2="595" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ddf9ff"/>
      <stop offset=".45" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f4ffff"/>
    </linearGradient>

    <linearGradient id="bevel" x1="335" y1="260" x2="725" y2="760" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e3fbff"/>
      <stop offset="1" stop-color="#82aebc"/>
    </linearGradient>

    <linearGradient id="cyan" x1="250" y1="560" x2="790" y2="575" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#39dde0"/>
      <stop offset=".55" stop-color="#37bdd9"/>
      <stop offset="1" stop-color="#5fa0ff"/>
    </linearGradient>

    <linearGradient id="blue" x1="295" y1="655" x2="805" y2="565" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2f9fbe"/>
      <stop offset=".55" stop-color="#35a8ea"/>
      <stop offset="1" stop-color="#628dff"/>
    </linearGradient>

    <linearGradient id="teal" x1="260" y1="700" x2="800" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4ed7ca"/>
      <stop offset=".5" stop-color="#75e9b2"/>
      <stop offset="1" stop-color="#55ddc7"/>
    </linearGradient>

    <linearGradient id="deepTeal" x1="250" y1="690" x2="750" y2="725" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2baec1"/>
      <stop offset="1" stop-color="#247b96"/>
    </linearGradient>

    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="28" stdDeviation="22" flood-color="#000" flood-opacity=".34"/>
    </filter>

    <filter id="smallShadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000" flood-opacity=".26"/>
    </filter>

    <clipPath id="shieldClip">
      <path d="M512 207 L771 356 L771 648 L512 807 L253 648 L253 356 Z"/>
    </clipPath>
  </defs>

  <rect width="1024" height="1024" rx="174" fill="url(#bg)"/>
  <rect width="1024" height="1024" rx="174" fill="url(#topGlow)"/>
  <rect width="1024" height="1024" rx="174" fill="url(#innerGlow)"/>

  <path
    d="M512 212 L766 359 L766 646 L512 811 L258 646 L258 359 Z"
    fill="#020814"
    opacity=".30"
    filter="url(#shadow)"
  />

  <g clip-path="url(#shieldClip)">
    <path
      d="M260 574 C367 520 466 512 566 566 C655 614 723 599 793 538 L793 608 C714 665 632 670 535 621 C439 572 353 573 260 628 Z"
      fill="url(#cyan)"
      opacity=".95"
    />

    <path
      d="M296 646 C391 594 493 606 587 654 C674 699 735 676 794 620 L794 696 C715 745 637 742 544 694 C448 645 368 636 296 678 Z"
